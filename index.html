<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的旅遊足跡 - 雲端分享版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #f8fafc; font-family: sans-serif; }
        .day-border { border-left: 2px solid #e2e8f0; }
        .day-dot { left: -9px; top: 0; width: 16px; height: 16px; background: #3b82f6; border-radius: 50%; border: 3px solid white; }
        .loading-overlay { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(4px); }
    </style>
</head>
<body>
    <div id="app" class="max-w-2xl mx-auto p-6 pb-32">
        <!-- Header -->
        <header class="text-center mb-10">
            <h1 id="trip-title" contenteditable="true" class="text-3xl font-bold text-gray-800 outline-none">我的精彩旅程</h1>
            <p class="text-gray-500 mt-2" id="mode-indicator">模式：本地儲存 (僅限此瀏覽器)</p>
        </header>

        <!-- 行程列表 -->
        <div id="days-container" class="space-y-10"></div>

        <!-- 功能按鈕 -->
        <div class="mt-10 space-y-4">
            <button onclick="addDay()" class="w-full py-3 border-2 border-dashed border-gray-300 rounded-xl text-gray-500 hover:border-blue-500 hover:text-blue-500 transition flex items-center justify-center gap-2">
                <i data-lucide="calendar-plus"></i> 新增下一天
            </button>
            <div class="flex gap-2">
                <button onclick="saveToCloud()" id="share-btn" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 transition flex items-center justify-center gap-2">
                    <i data-lucide="share-2"></i> 儲存並產生分享連結
                </button>
                <button onclick="clearData()" class="px-4 py-3 bg-gray-100 text-gray-400 rounded-xl hover:bg-red-50 hover:text-red-500 transition">
                    <i data-lucide="trash-2"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- 載入中遮罩 -->
    <div id="loader" class="fixed inset-0 loading-overlay flex flex-col items-center justify-center z-50 hidden">
        <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-500 border-t-transparent mb-4"></div>
        <p class="text-blue-600 font-medium">同步雲端資料中...</p>
    </div>

    <!-- Firebase 模組 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // 全局狀態
        let travelData = {
            title: "我的精彩旅程",
            days: [{ id: Date.now(), items: [] }]
        };
        let db, auth, appId, isCloudEnabled = false;

        // 初始化
        async function init() {
            // 嘗試偵測 Firebase 環境
            try {
                if (typeof __firebase_config !== 'undefined') {
                    const firebaseConfig = JSON.parse(__firebase_config);
                    const app = initializeApp(firebaseConfig);
                    db = getFirestore(app);
                    auth = getAuth(app);
                    appId = typeof __app_id !== 'undefined' ? __app_id : 'travel-app';
                    
                    // 執行登入
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                    isCloudEnabled = true;
                    document.getElementById('mode-indicator').innerText = "模式：雲端同步已啟動";
                }
            } catch (e) {
                console.log("未檢測到雲端設定，切換至本地模式");
            }

            // 如果有 Hash 位址，則從雲端抓取資料
            const hashId = window.location.hash.substring(1);
            if (hashId && isCloudEnabled) {
                showLoader(true);
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'itineraries', hashId);
                const snap = await getDoc(docRef);
                if (snap.exists()) {
                    travelData = snap.data();
                    document.getElementById('mode-indicator').innerText = "模式：正在檢視分享行程";
                    // 唯讀模式下隱藏功能按鈕
                    document.getElementById('trip-title').contentEditable = "false";
                }
                showLoader(false);
            } else {
                // 本地讀取
                const saved = localStorage.getItem('my_travel_v2');
                if (saved) {
                    travelData = JSON.parse(saved);
                }
            }
            
            render();
            setupListeners();
        }

        function setupListeners() {
            document.getElementById('trip-title').innerText = travelData.title;
            document.getElementById('trip-title').addEventListener('input', (e) => {
                travelData.title = e.target.innerText;
                saveLocally();
            });
        }

        // 暴露功能給 HTML onclick
        window.addDay = () => {
            travelData.days.push({ id: Date.now(), items: [] });
            render();
            saveLocally();
        };

        window.addActivity = (dayId) => {
            const day = travelData.days.find(d => d.id === dayId);
            day.items.push({ id: Date.now(), name: "", note: "", img: "" });
            render();
            saveLocally();
        };

        window.updateText = (dayId, itemId, field, value) => {
            const day = travelData.days.find(d => d.id === dayId);
            const item = day.items.find(i => i.id === itemId);
            item[field] = value;
            saveLocally();
        };

        window.handleImage = (dayId, itemId, input) => {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const max = 800;
                    let w = img.width, h = img.height;
                    if (w > max) { h *= max/w; w = max; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    const day = travelData.days.find(d => d.id === dayId);
                    const item = day.items.find(i => i.id === itemId);
                    item.img = canvas.toDataURL('image/jpeg', 0.6);
                    render();
                    saveLocally();
                };
            };
            reader.readAsDataURL(file);
        };

        window.deleteItem = (dayId, itemId) => {
            const day = travelData.days.find(d => d.id === dayId);
            day.items = day.items.filter(i => i.id !== itemId);
            render();
            saveLocally();
        };

        window.saveToCloud = async () => {
            if (!isCloudEnabled) {
                alert("目前處於本地模式。請確認 GitHub 設定或聯繫開發者啟用雲端功能。");
                return;
            }
            showLoader(true);
            const shareId = crypto.randomUUID().substring(0, 8);
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'itineraries', shareId);
                await setDoc(docRef, travelData);
                const shareUrl = `${window.location.origin}${window.location.pathname}#${shareId}`;
                
                // 複製連結
                const tempInput = document.createElement("input");
                tempInput.value = shareUrl;
                document.body.appendChild(tempInput);
                tempInput.select();
                document.execCommand("copy");
                document.body.removeChild(tempInput);
                
                alert("儲存成功！分享連結已複製到剪貼簿：\n" + shareUrl);
                window.location.hash = shareId;
            } catch (e) {
                alert("儲存失敗，請重試");
            }
            showLoader(false);
        };

        window.clearData = () => {
            if(confirm("確定要清空嗎？")) {
                localStorage.removeItem('my_travel_v2');
                window.location.hash = "";
                location.reload();
            }
        };

        function saveLocally() {
            localStorage.setItem('my_travel_v2', JSON.stringify(travelData));
        }

        function showLoader(show) {
            document.getElementById('loader').classList.toggle('hidden', !show);
        }

        function render() {
            const container = document.getElementById('days-container');
            container.innerHTML = travelData.days.map((day, idx) => `
                <div class="relative pl-6 day-border">
                    <div class="absolute day-dot"></div>
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold text-blue-600">第 ${idx + 1} 天</h2>
                        ${window.location.hash ? '' : `
                            <button onclick="addActivity(${day.id})" class="text-sm bg-blue-50 text-blue-500 px-3 py-1 rounded-full hover:bg-blue-100 transition flex items-center gap-1">
                                <i data-lucide="plus" class="w-4 h-4"></i> 新增行程
                            </button>
                        `}
                    </div>
                    <div class="space-y-4">
                        ${day.items.map(item => `
                            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                                ${item.img ? `<img src="${item.img}" class="w-full h-auto max-h-96 object-cover rounded-lg mb-3">` : ''}
                                <input type="text" placeholder="景點名稱" value="${item.name}" 
                                    ${window.location.hash ? 'disabled' : ''}
                                    oninput="updateText(${day.id}, ${item.id}, 'name', this.value)"
                                    class="w-full font-bold text-gray-700 mb-1 outline-none border-b border-transparent focus:border-blue-200 bg-transparent">
                                <textarea placeholder="當下的心情..." 
                                    ${window.location.hash ? 'disabled' : ''}
                                    oninput="updateText(${day.id}, ${item.id}, 'note', this.value)"
                                    class="w-full text-sm text-gray-500 outline-none resize-none bg-transparent">${item.note}</textarea>
                                ${window.location.hash ? '' : `
                                    <div class="flex justify-between mt-2 pt-2 border-t border-gray-50">
                                        <label class="text-xs text-gray-400 cursor-pointer hover:text-blue-500 flex items-center gap-1">
                                            <i data-lucide="image" class="w-3 h-3"></i> 上傳照片
                                            <input type="file" class="hidden" accept="image/*" onchange="handleImage(${day.id}, ${item.id}, this)">
                                        </label>
                                        <button onclick="deleteItem(${day.id}, ${item.id})" class="text-xs text-gray-300 hover:text-red-400">刪除</button>
                                    </div>
                                `}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        init();
    </script>
</body>
</html>

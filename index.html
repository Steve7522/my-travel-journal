<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的旅遊足跡 - 雲端分享版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #f8fafc; font-family: sans-serif; }
        .day-border { border-left: 2px solid #e2e8f0; }
        .day-dot { left: -9px; top: 0; width: 16px; height: 16px; background: #3b82f6; border-radius: 50%; border: 3px solid white; }
        .loading-overlay { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(4px); }
    </style>
</head>
<body>
    <div id="app" class="max-w-2xl mx-auto p-6 pb-32">
        <!-- 標題區域 -->
        <header class="text-center mb-10">
            <h1 id="trip-title" contenteditable="true" class="text-3xl font-bold text-gray-800 outline-none">我的精彩旅程</h1>
            <p class="text-gray-400 text-sm mt-2" id="mode-indicator">模式：正在檢查連線...</p>
        </header>

        <!-- 行程列表容器 -->
        <div id="days-container" class="space-y-10"></div>

        <!-- 功能控制區 -->
        <div class="mt-10 space-y-4">
            <button onclick="addDay()" class="w-full py-3 border-2 border-dashed border-gray-300 rounded-xl text-gray-500 hover:border-blue-500 hover:text-blue-500 transition flex items-center justify-center gap-2">
                <i data-lucide="calendar-plus"></i> 新增下一天
            </button>
            
            <div class="grid grid-cols-1 gap-3">
                <button onclick="saveToCloud()" id="share-btn" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 transition flex items-center justify-center gap-2">
                    <i data-lucide="share-2"></i> 儲存並產生分享連結
                </button>
                
                <div class="flex gap-2">
                    <button onclick="exportJSON()" class="flex-1 py-2 bg-white border border-gray-200 text-gray-600 rounded-lg text-sm font-medium hover:bg-gray-50 flex items-center justify-center gap-2">
                        <i data-lucide="download" class="w-4 h-4"></i> 匯出 JSON
                    </button>
                    <label class="flex-1 py-2 bg-white border border-gray-200 text-gray-600 rounded-lg text-sm font-medium hover:bg-gray-50 flex items-center justify-center gap-2 cursor-pointer">
                        <i data-lucide="upload" class="w-4 h-4"></i> 匯入 JSON
                        <input type="file" class="hidden" accept=".json" onchange="importJSON(this)">
                    </label>
                </div>

                <button onclick="clearData()" class="w-full py-2 text-xs text-red-300 hover:text-red-500 transition">
                    清空目前瀏覽器中的紀錄
                </button>
            </div>
        </div>
    </div>

    <!-- 處理中動畫 -->
    <div id="loader" class="fixed inset-0 loading-overlay flex flex-col items-center justify-center z-50 hidden">
        <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-500 border-t-transparent mb-4"></div>
        <p class="text-blue-600 font-medium">同步中...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // ==========================================
        // 🛠️ 已自動填入你提供的 Firebase 設定資料
        // ==========================================
        const myFirebaseConfig = {
            apiKey: "AIzaSyA4H7f_inVipLx6CtbUpOnStCAWVNO7xlc",
            authDomain: "steve-emma.firebaseapp.com",
            projectId: "steve-emma",
            storageBucket: "steve-emma.firebasestorage.app",
            messagingSenderId: "968559910601",
            appId: "1:968559910601:web:7e0f612bdf83ee5b477718",
            measurementId: "G-SPWBV8TY1X"
        };

        // 預設資料結構
        let travelData = {
            title: "我的精彩旅程",
            days: [{ id: Date.now(), items: [] }]
        };
        
        let db, auth, isCloudEnabled = false;

        async function init() {
            try {
                // 初始化 Firebase
                const app = initializeApp(myFirebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
                
                // 執行匿名登入
                await signInAnonymously(auth);
                isCloudEnabled = true;
                document.getElementById('mode-indicator').innerText = "模式：雲端同步已啟動 (Steve-Emma 專案)";
            } catch (e) {
                console.error("Firebase 初始化失敗:", e);
                document.getElementById('mode-indicator').innerText = "模式：連線失敗，改用本地儲存";
            }

            // 路由檢查：如果是分享連結 (# 開頭)
            const hashId = window.location.hash.substring(1);
            if (hashId && isCloudEnabled) {
                showLoader(true);
                try {
                    const docRef = doc(db, 'itineraries', hashId);
                    const snap = await getDoc(docRef);
                    if (snap.exists()) {
                        travelData = snap.data();
                        document.getElementById('mode-indicator').innerText = "模式：正在觀看分享行程";
                        document.getElementById('trip-title').contentEditable = "false";
                    }
                } catch(e) {
                    alert("載入分享內容失敗，請確認資料庫規則是否已發佈為 true");
                }
                showLoader(false);
            } else {
                // 讀取本地快取
                const saved = localStorage.getItem('my_travel_v3');
                if (saved) {
                    travelData = JSON.parse(saved);
                }
            }
            
            render();
            setupTitleListener();
        }

        function setupTitleListener() {
            document.getElementById('trip-title').innerText = travelData.title;
            document.getElementById('trip-title').addEventListener('input', (e) => {
                travelData.title = e.target.innerText;
                saveLocally();
            });
        }

        window.addDay = () => {
            travelData.days.push({ id: Date.now(), items: [] });
            render();
            saveLocally();
        };

        window.addActivity = (dayId) => {
            const day = travelData.days.find(d => d.id === dayId);
            day.items.push({ id: Date.now(), name: "", note: "", img: "" });
            render();
            saveLocally();
        };

        window.updateText = (dayId, itemId, field, value) => {
            const day = travelData.days.find(d => d.id === dayId);
            const item = day.items.find(i => i.id === itemId);
            item[field] = value;
            saveLocally();
        };

        window.handleImage = (dayId, itemId, input) => {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const max = 800; 
                    let w = img.width, h = img.height;
                    if (w > max) { h *= max/w; w = max; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    const day = travelData.days.find(d => d.id === dayId);
                    const item = day.items.find(i => i.id === itemId);
                    item.img = canvas.toDataURL('image/jpeg', 0.6);
                    render();
                    saveLocally();
                };
            };
            reader.readAsDataURL(file);
        };

        window.deleteItem = (dayId, itemId) => {
            const day = travelData.days.find(d => d.id === dayId);
            day.items = day.items.filter(i => i.id !== itemId);
            render();
            saveLocally();
        };

        window.saveToCloud = async () => {
            if (!isCloudEnabled) {
                alert("Firebase 未能成功初始化。");
                return;
            }
            showLoader(true);
            const shareId = crypto.randomUUID().substring(0, 8);
            try {
                const docRef = doc(db, 'itineraries', shareId);
                await setDoc(docRef, travelData);
                
                const shareUrl = `${window.location.origin}${window.location.pathname}#${shareId}`;
                copyToClipboard(shareUrl);
                alert("✅ 儲存成功！\n專屬分享連結已複製：\n" + shareUrl);
                window.location.hash = shareId;
            } catch (e) {
                console.error(e);
                alert("儲存失敗！請確認 Firestore 規則是否已設為 allow read, write: if true;");
            }
            showLoader(false);
        };

        window.exportJSON = () => {
            const blob = new Blob([JSON.stringify(travelData)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `旅遊紀錄-${travelData.title}.json`;
            a.click();
        };

        window.importJSON = (input) => {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    travelData = JSON.parse(e.target.result);
                    render();
                    saveLocally();
                    document.getElementById('trip-title').innerText = travelData.title;
                    alert("匯入成功！");
                } catch (err) { alert("無效的檔案"); }
            };
            reader.readAsText(file);
        };

        window.clearData = () => {
            if(confirm("確定要清空嗎？這會刪除這台電腦上的紀錄。")) {
                localStorage.removeItem('my_travel_v3');
                window.location.hash = "";
                location.reload();
            }
        };

        function saveLocally() {
            localStorage.setItem('my_travel_v3', JSON.stringify(travelData));
        }

        function showLoader(show) {
            document.getElementById('loader').classList.toggle('hidden', !show);
        }

        function copyToClipboard(text) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
        }

        function render() {
            const container = document.getElementById('days-container');
            const isReadOnly = !!window.location.hash;
            
            container.innerHTML = travelData.days.map((day, idx) => `
                <div class="relative pl-6 day-border">
                    <div class="absolute day-dot"></div>
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold text-blue-600">第 ${idx + 1} 天</h2>
                        ${isReadOnly ? '' : `
                            <button onclick="addActivity(${day.id})" class="text-sm bg-blue-50 text-blue-500 px-3 py-1 rounded-full hover:bg-blue-100 transition flex items-center gap-1">
                                <i data-lucide="plus" class="w-4 h-4"></i> 新增行程
                            </button>
                        `}
                    </div>
                    <div class="space-y-4">
                        ${day.items.map(item => `
                            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                                ${item.img ? `<img src="${item.img}" class="w-full h-auto max-h-96 object-cover rounded-lg mb-3">` : ''}
                                <input type="text" placeholder="景點名稱" value="${item.name}" 
                                    ${isReadOnly ? 'disabled' : ''}
                                    oninput="updateText(${day.id}, ${item.id}, 'name', this.value)"
                                    class="w-full font-bold text-gray-700 mb-1 outline-none bg-transparent">
                                <textarea placeholder="當下的心情..." 
                                    ${isReadOnly ? 'disabled' : ''}
                                    oninput="updateText(${day.id}, ${item.id}, 'note', this.value)"
                                    class="w-full text-sm text-gray-500 outline-none resize-none bg-transparent">${item.note}</textarea>
                                ${isReadOnly ? '' : `
                                    <div class="flex justify-between mt-2 pt-2 border-t border-gray-50">
                                        <label class="text-xs text-gray-400 cursor-pointer hover:text-blue-500 flex items-center gap-1">
                                            <i data-lucide="image" class="w-3 h-3"></i> 上傳照片
                                            <input type="file" class="hidden" accept="image/*" onchange="handleImage(${day.id}, ${item.id}, this)">
                                        </label>
                                        <button onclick="deleteItem(${day.id}, ${item.id})" class="text-xs text-gray-300 hover:text-red-400">刪除行程</button>
                                    </div>
                                `}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        init();
    </script>
</body>
</html>
